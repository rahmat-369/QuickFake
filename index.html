    <script>
        // Konfigurasi 9 Endpoint Lengkap (TIDAK ADA YANG DIKURANGI)
        const fieldsConfig = {
            "/maker/brat": [{ name: "text", type: "text", label: "Teks Brat" }],
            "/maker/bratvid": [{ name: "text", type: "text", label: "Teks Video Brat" }],
            "/maker/fakecall": [
                { name: "nama", type: "text", label: "Nama Pemanggil" },
                { name: "durasi", type: "text", label: "Durasi / Status (ex: Calling..., 00:15)" },
                { name: "avatar", type: "file", label: "Foto Profil" }
            ],
            "/maker/fakedanav2": [{ name: "nominal", type: "number", label: "Jumlah Saldo" }],
            "/maker/fakefbcomment": [
                { name: "name", type: "text", label: "Nama Pengguna" },
                { name: "comment", type: "text", label: "Isi Komentar" },
                { name: "url", type: "file", label: "Foto Profil" }
            ],
            "/maker/fakegroup": [
                { name: "title", type: "text", label: "Nama Grup" },
                { name: "number", type: "text", label: "Jumlah Anggota / ID" },
                { name: "time", type: "text", label: "Waktu (ex: 12.00)" },
                { name: "url", type: "file", label: "Foto Grup" }
            ],
            "/maker/fakeigpost": [
                { name: "username", type: "text", label: "Username IG" },
                { name: "likes", type: "number", label: "Jumlah Like" },
                { name: "comment", type: "text", label: "Komentar" },
                { name: "share", type: "number", label: "Jumlah Share" },
                { name: "repost", type: "number", label: "Jumlah Repost" },
                { name: "date", type: "text", label: "Waktu Relatif (ex: 1d)" },
                { name: "desc", type: "text", label: "Caption Postingan" },
                { name: "avatar", type: "file", label: "Foto Profil" },
                { name: "content", type: "file", label: "Foto Postingan Utama" }
            ],
            "/maker/faketiktok": [
                { name: "name", type: "text", label: "Nama Lengkap" },
                { name: "username", type: "text", label: "Username TikTok" },
                { name: "following", type: "text", label: "Jumlah Following (ex: 120)" },
                { name: "followers", type: "text", label: "Jumlah Followers (ex: 2jt)" },
                { name: "likes", type: "text", label: "Jumlah Likes (ex: 12999)" },
                { name: "url", type: "file", label: "Foto Profil" }
            ],
            "/maker/fakettcomment": [
                { name: "username", type: "text", label: "Username TikTok" },
                { name: "comment", type: "text", label: "Isi Komentar" },
                { name: "date", type: "text", label: "Waktu Relatif (ex: 1d)" },
                { name: "url", type: "file", label: "Foto Profil" }
            ]
        };

        // Render input field berdasarkan dropdown
        function updateFields() {
            const ep = document.getElementById('endpoint').value;
            const container = document.getElementById('dynamicFields');
            container.innerHTML = '';
            
            fieldsConfig[ep]?.forEach(f => {
                const isFile = f.type === 'file';
                const inputClass = isFile 
                    ? "w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-cyan-900 file:text-cyan-300 hover:file:bg-cyan-800 cursor-pointer bg-gray-900 border border-gray-700 rounded-lg outline-none" 
                    : "w-full p-2.5 bg-gray-900 text-sm text-white rounded-lg border border-gray-600 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition-all";
                
                const extraAttr = isFile ? 'accept="image/*"' : '';
                
                container.innerHTML += `
                    <div class="mb-1">
                        <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wide">${f.label}</label>
                        <input type="${f.type}" name="${f.name}" ${extraAttr} class="${inputClass}" placeholder="Masukkan ${f.label.toLowerCase()}..." required>
                    </div>`;
            });
        }

        // Fungsi Toast Notification (Rapi & Kecil)
        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastMessage');
            
            clearTimeout(toastTimeout);
            
            text.innerText = message;
            if(type === 'success') {
                toast.className = "fixed bottom-5 right-5 px-4 py-2.5 rounded-md text-xs font-medium shadow-xl transform transition-all duration-300 z-50 flex items-center gap-2 bg-green-900/90 text-green-300 border border-green-700 backdrop-blur-sm";
                icon.innerHTML = '✓';
            } else {
                toast.className = "fixed bottom-5 right-5 px-4 py-2.5 rounded-md text-xs font-medium shadow-xl transform transition-all duration-300 z-50 flex items-center gap-2 bg-red-900/90 text-red-300 border border-red-700 backdrop-blur-sm";
                icon.innerHTML = '✕';
            }

            // Tampilkan animasi masuk
            toast.classList.remove('translate-y-10', 'opacity-0');
            
            // Hilangkan setelah 3.5 detik
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3500);
        }

        // Proses Submit Form (Logika Backend Proxy)
        document.getElementById('mockupForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const icon = document.getElementById('loadingIcon');
            const ep = document.getElementById('endpoint').value;
            const resultBox = document.getElementById('result');
            
            // UI Loading State
            btn.querySelector('span').innerText = "Processing...";
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            icon.classList.remove('hidden');
            resultBox.classList.add('hidden', 'opacity-0');

            const formData = new FormData(e.target);
            try {
                showToast("Mengunggah & Memproses...", "success");
                
                const res = await fetch('/api/generate', { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.success) {
                    showToast("Mockup Berhasil Dibuat!", "success");
                    resultBox.classList.remove('hidden');
                    // Delay sedikit agar transisi opacity terlihat
                    setTimeout(() => resultBox.classList.remove('opacity-0'), 50);
                    
                    const mediaContainer = document.getElementById('mediaContainer');
                    
                    // Deteksi Video vs Image
                    if(ep === '/maker/bratvid') {
                        mediaContainer.innerHTML = `<video controls autoplay loop class="w-full max-h-[500px] object-contain bg-black"><source src="${data.imageUrl}" type="video/mp4">Browser kamu tidak support video.</video>`;
                    } else {
                        mediaContainer.innerHTML = `<img src="${data.imageUrl}" class="w-full max-h-[500px] object-contain bg-black">`;
                    }
                    
                    document.getElementById('downloadBtn').href = data.imageUrl;
                } else {
                    showToast("Gagal: " + data.message, "error");
                }
            } catch (err) {
                showToast("Terjadi kesalahan jaringan/server!", "error");
            } finally {
                // Kembalikan tombol seperti semula
                btn.querySelector('span').innerText = "Generate Mockup";
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                icon.classList.add('hidden');
            }
        };

        // Inisialisasi input saat halaman pertama kali dimuat
        updateFields(); 
    </script>
